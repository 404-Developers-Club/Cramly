<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cramly Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Ubuntu:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <template class="assignmentTemplate">
        <article class="assignment">
            <div class="assignmentHeading">
                <h3 class="assignmentName">Test</h3>
                <img class="assignmentAlertIcon" src="AlertIcon.png" alt="Alert icon">
            </div>
            <div class="assignmentDetails">
                <p class="dueDay">Days Until Due: </p>
                <p class="urgency">Urgency Score: </p>
                <p class="desc">Description</p>
            </div>
            <button class="x2" type="button" onclick="done(event)">Done</button>
        </article>
    </template>

    <main class="dashboard-shell">
        <header class="header">
            <div class="header-inner">
                <div>
                    <p class="eyebrow">Assignment planner</p>
                    <h1 class="header-title">Assignment Dashboard</h1>
                </div>
                <button id="addButton" type="button" onclick="addAssignment()">Add Assignment</button>
            </div>
        </header>

        <section class="dashboard-content" aria-label="Assignments overview">
            <div id="prioritAssignmentDesc" class="dashboard-note"></div>
            <div id="assignmentPool"></div>
        </section>
    </main>

    <section id="assignmentPanel" aria-label="Add assignment panel">
        <button class="x" type="button" onclick="removePanel()" aria-label="Close panel">X</button>
        <h2 class="panelHeader">Add Assignment</h2>

        <div id="layer1" class="panel-row">
            <label id="panelAssignmentName" for="inputName">Assignment Name</label>
            <input id="inputName" type="text" autocomplete="off">
        </div>

        <div id="layer2" class="panel-row">
            <label id="panelAssignmentDate" for="inputDate">Due Date</label>
            <input id="inputDate" type="datetime-local">
        </div>

        <div id="layer3" class="panel-grid">
    
            <div class="field-group">
                <label id="panelAssignmentTaskCompleted" for="inputTask">Tasks Completed (%)</label>
                <input id="inputTask" type="text" inputmode="decimal">
            </div>
            <div class="field-group">
                <label id="panelAssignmentImportance" for="inputImportance">Importance (1-10)</label>
                <input id="inputImportance" type="text" inputmode="decimal">
            </div>
            <div class="field-group">
                <label id="panelAssignmentDiff" for="inputDiff">Difficulty</label>
                <input id="inputDiff" type="text" inputmode="decimal">
            </div>
            <div class="field-group field-group-action">
                <button id="estimate" type="button" onclick="estimate()">Estimate Difficulty</button>
            </div>
            <div class="field-group field-group-wide">
                <label id="panelAssignmentDesc" for="inputDesc">Description</label>
            </div>
        </div>

        <div id="layer4" class="panel-row">
            <textarea id="inputDesc" placeholder="Description is needed to estimate difficulty."></textarea>
        </div>

        <div id="layer5" class="panel-row panel-submit">
            <button id="submit" type="button" onclick="completeAssignment()">Submit</button>
        </div>
    </section>

    <script src="index.js" type="module"></script>
</body>
</html>
